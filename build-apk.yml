# Repo kokunde VEYA SwitchTranslator/ alt klasorunde proje olabilir (manuel yukleme).

name: Build debug APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Proje klasorunu bul
        id: proj
        run: |
          if [ -f ./gradlew ]; then echo "dir=." >> $GITHUB_OUTPUT
          elif [ -f ./SwitchTranslator/gradlew ]; then echo "dir=SwitchTranslator" >> $GITHUB_OUTPUT
          else echo "::error::gradlew yok. gradle/ ve gradlew dosyalarini yuklediginden emin ol."; exit 1; fi

      - name: gradlew hazirla
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          sed -i 's/\r$//' gradlew || true
          chmod +x gradlew

      - name: Derle
        working-directory: ${{ steps.proj.outputs.dir }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK dosya yolu
        id: apk
        run: |
          D="${{ steps.proj.outputs.dir }}"
          if [ "$D" = "." ]; then echo "path=app/build/outputs/apk/debug/*.apk" >> $GITHUB_OUTPUT
          else echo "path=$D/app/build/outputs/apk/debug/*.apk" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: SwitchTranslator-debug
          path: ${{ steps.apk.outputs.path }}
