# Repo kokunde VEYA SwitchTranslator/ alt klasorunde Gradle projesi olabilir.
# Guncel: actions/checkout@v4, setup-java@v4, upload-artifact@v4

name: Build debug APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Uyari gurultusu (Node 20); derlemeyi etkilemez
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: "**/gradle/wrapper/gradle-wrapper.properties"

      - name: Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Proje klasorunu bul
        id: proj
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          GRADLEW=""
          while IFS= read -r line; do
            d="$(dirname "$line")"
            if [ -f "$d/app/build.gradle.kts" ] || [ -f "$d/app/build.gradle" ]; then
              GRADLEW="$line"
              break
            fi
          done < <(find . -name gradlew -type f ! -path './.git/*' 2>/dev/null || true)
          if [ -z "$GRADLEW" ]; then
            GRADLEW=$(find . -name gradlew -type f ! -path './.git/*' 2>/dev/null | head -n1 || true)
          fi
          if [ -z "$GRADLEW" ]; then
            echo "::error::gradlew bulunamadi."
            find . -maxdepth 8 \( -type f -o -type d \) 2>/dev/null | head -120
            exit 1
          fi
          DIR="$(dirname "$GRADLEW")"
          REL="$(realpath --relative-to="$GITHUB_WORKSPACE" "$DIR")"
          echo "dir=$REL" >> "$GITHUB_OUTPUT"
          echo "Gradle proje: $REL"

      - name: gradle.properties CI (SSL)
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/^systemProp\.javax\.net\.ssl\.trustStoreType=Windows-ROOT/d' gradle.properties || true
            sed -i 's/ -Djavax\.net\.ssl\.trustStoreType=Windows-ROOT//g' gradle.properties || true
          fi

      - name: Gradle wrapper jar
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
              "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar"
          fi
          test -f gradle/wrapper/gradle-wrapper.jar || exit 1

      - name: gradlew hazirla
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          sed -i 's/\r$//' gradlew || true
          chmod +x gradlew

      # Paralel proje derlemesi + agir native merge bazi runner'larda exit 1 uretir
      - name: CI Gradle ayarlari
        working-directory: ${{ steps.proj.outputs.dir }}
        run: echo "org.gradle.parallel=false" >> gradle.properties

      - name: Derle
        working-directory: ${{ steps.proj.outputs.dir }}
        env:
          ORG_GRADLE_JAVA_INSTALLATIONS_AUTO_DOWNLOAD: "false"
          GRADLE_OPTS: "-Xmx4096m -Dfile.encoding=UTF-8"
          _JAVA_OPTIONS: "-Xmx4096m"
        shell: bash
        run: |
          set -eo pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace --no-build-cache 2>&1 | tee gradle-ci.log

      - name: Hata logu (Derle basarisizsa)
        if: failure()
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          echo "::group::What went wrong (Gradle)"
          grep -A 35 "What went wrong" gradle-ci.log 2>/dev/null || echo "(bulunamadi)"
          echo "::endgroup::"
          echo "::group::Failed task"
          grep -B 2 -A 30 "Execution failed for task" gradle-ci.log 2>/dev/null | head -80 || true
          echo "::endgroup::"
          echo "::group::Son 100 satir"
          tail -100 gradle-ci.log 2>/dev/null || true
          echo "::endgroup::"

      - name: Tam Gradle logu indir (hata olunca)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-full-log
          path: "**/gradle-ci.log"

      - name: APK yolu
        id: apk
        run: |
          D="${{ steps.proj.outputs.dir }}"
          if [ "$D" = "." ]; then echo "path=app/build/outputs/apk/debug/*.apk" >> $GITHUB_OUTPUT
          else echo "path=$D/app/build/outputs/apk/debug/*.apk" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: SwitchTranslator-debug
          path: ${{ steps.apk.outputs.path }}
