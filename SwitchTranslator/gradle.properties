# Gradle ve derleme icin JDK 17 gerekir (Android Studio JBR yeterli).
# Windows-ROOT / kurumsal MITM icin SSL ayarlarini repoya koyma: GitHub Actions (Linux) JVM'de SSL bozulur.
# Gerekirse sadece kendi PC'de ~/.gradle/gradle.properties icine ekleyin:
#   systemProp.javax.net.ssl.trustStoreType=Windows-ROOT
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djdk.tls.client.protocols=TLSv1.2,TLSv1.3
org.gradle.parallel=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
